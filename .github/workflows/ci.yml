name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn compile -B
        working-directory: account-service

      - name: Run unit tests
        run: mvn test -B -Dtest="!ConcurrencyIntegrationTest"
        working-directory: account-service

      - name: Build Docker image
        run: docker build -t novobanco/account-service:latest .
        working-directory: account-service
